name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            --entrypoint sh \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            -c 'git config --global --add safe.directory /repo && gitleaks git --redact --config /repo/.gitleaks.toml /repo'
