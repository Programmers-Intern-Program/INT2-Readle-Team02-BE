spring:
  application:
    name: readle

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8 # 스크립트 인코딩 설정

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        # Canonical server time authority for point_history.created_at etc. is Asia/Seoul (KST).
        jdbc:
          time_zone: Asia/Seoul

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

anthropic:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    version: "2023-06-01"
    model: claude-sonnet-5
    base-url: https://api.anthropic.com
    max-tokens: 4000

security:
  jwt-issuer: ${JWT_ISSUER:readle}
  jwt-secret: ${JWT_SECRET:}
  jwt-audience: readle-api
  access-token-minutes: 30
  refresh-token-days: 14
  state-encryption-key: ${OAUTH_STATE_ENCRYPTION_KEY:}
  state-minutes: 10
  backend-origin: ${BACKEND_ORIGIN:http://localhost:8080}
  allowed-return-paths: ${OAUTH_ALLOWED_RETURN_PATHS:/}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      authorization-url: https://accounts.google.com/o/oauth2/v2/auth
      token-url: https://oauth2.googleapis.com/token
      user-info-url: https://openidconnect.googleapis.com/v1/userinfo
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      authorization-url: https://kauth.kakao.com/oauth/authorize
      token-url: https://kauth.kakao.com/oauth/token
      user-info-url: https://kapi.kakao.com/v2/user/me

content:
  validation:
    # 1차 방어선 가드레일 설정
    min-length: 300
    prompt-injection-keywords:
      - "ignore previous"
      - "jailbreak"
      - "유출 시도"
      - "system prompt"
    # 자바 리소스 경로로 추출해 둔 badwords 파일 경로
    badwords-ko-resource-path: "classpath:data/validation/badwords-ko.txt"

    # 2차 방어선 화이트리스트 도메인 설정
    whitelist-domains:
      - velog.io
      - tistory.com
      - medium.com
      - github.com
